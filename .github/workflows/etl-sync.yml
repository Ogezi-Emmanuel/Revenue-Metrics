name: RevOps Nightly AI Sync

# Define when this script runs
on:
  schedule:
    # Runs at 2:00 AM UTC daily
    - cron: '0 2 * * *' 
  # This line adds a manual "Run Workflow" button in the GitHub UI so you can trigger it anytime
  workflow_dispatch: 

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11.6
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.6'

      - name: Install ML & API Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests simple-salesforce scikit-learn joblib python-dotenv- name: Install ML & API Dependencies


      - name: Run HubSpot Forward/Reverse ETL
        env:
          HUBSPOT_PRIVATE_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_TOKEN }}
        run: |
          cd etl_pipeline
          python master_orchestrator.py --target hubspot

      - name: Run Salesforce Forward/Reverse ETL
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
        run: |
          cd etl_pipeline
          python master_orchestrator.py --target salesforce

      - name: Commit and Push Updated Data Lake to Render
        run: |
          git config --global user.name "RevOps AI Bot"
          git config --global user.email "bot@revops.ai"
          # Stage the newly modified CSV
          git add ml_service/synthetic_pipeline_payload.csv
          # Commit the changes. The [skip ci] prevents an infinite loop.
          git commit -m "Automated Data Lake Sync [skip ci]" || echo "No pipeline changes detected"
          git push